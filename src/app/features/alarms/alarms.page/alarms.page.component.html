<h2>
  <i class="fas fa-bell"></i>
  Alarmas
</h2>

<mat-card class="filters">
  <form class="filters-form">
    <mat-form-field appearance="outline">
      <mat-label>Desde</mat-label>
      <input matInput type="date">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Hasta</mat-label>
      <input matInput type="date">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Severidad</mat-label>
      <mat-select>
        <mat-option value="">Todas</mat-option>
        <mat-option value="1">1 - Crítica</mat-option>
        <mat-option value="2">2 - Alta</mat-option>
        <mat-option value="3">3 - Media</mat-option>
        <mat-option value="4">4 - Baja</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tag</mat-label>
      <input matInput placeholder="Ej: PUMP_01">
    </mat-form-field>

    <button mat-raised-button color="primary">
      <i class="fas fa-filter"></i>
      Filtrar
    </button>
  </form>
</mat-card>

<mat-card>
  <table mat-table [dataSource]="[]" class="mat-elevation-z1">

    <ng-container matColumnDef="tag">
      <th mat-header-cell *matHeaderCellDef>Tag</th>
      <td mat-cell *matCellDef="let row">{{ row.tag }}</td>
    </ng-container>

    <ng-container matColumnDef="severity">
      <th mat-header-cell *matHeaderCellDef>Severidad</th>
      <td mat-cell *matCellDef>
        <span class="badge severity-1">Alta</span>
      </td>
    </ng-container>

    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Estado</th>
      <td mat-cell *matCellDef>ACTIVA</td>
    </ng-container>

    <ng-container matColumnDef="date">
      <th mat-header-cell *matHeaderCellDef>Fecha</th>
      <td mat-cell *matCellDef>2024-01-01</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="['tag','severity','status','date']"></tr>
    <tr mat-row *matRowDef="let row; columns: ['tag','severity','status','date']"></tr>

  </table>
</mat-card>
